#:schema https://yazi-rs.github.io/schemas/keymap.json

[[mgr.prepend_keymap]]
on   = "q"
run  = "close"
desc = "Close the current tab, or quit if it's last"

[[mgr.prepend_keymap]]
on   = "<C-c>"
run  = "quit"
desc = "Quit the process"

[[mgr.prepend_keymap]]
on = [";"]
run = "shell 'nucmd \" $0\"' --interactive --cursor=7"
desc = "Run a shell command"

[[mgr.prepend_keymap]]
on = [":"]
run = "shell 'nucmd \" $0\"' --block --interactive --cursor=7"
desc = "Run a shell command (block until finishes)"

[[mgr.prepend_keymap]]
on   = "!"
run  = 'shell "$SHELL" --block'
desc = "Open $SHELL here"
for  = "unix"

[[mgr.prepend_keymap]]
on   = "p"
run  = "plugin smart-paste"
desc = "Paste yanked files"

[[mgr.prepend_keymap]]
on   = "z"
run  = "plugin zoxide"
desc = "Jump to directory via zoxide"

[[mgr.prepend_keymap]]
on   = "Z"
run  = "plugin fzf"
desc = "Jump to file/directory via fzf"

[[mgr.prepend_keymap]]
on = [ "g", "r" ]
run = 'shell -- ya emit cd "$(git rev-parse --show-toplevel)"'
desc = "Go to git root"

[[mgr.prepend_keymap]]
on = [ "g", "d" ]
run = "cd ~/Desktop"
desc = "Go to Desktop"

[[mgr.prepend_keymap]]
on = [ "g", "D" ]
run = "cd ~/Downloads"
desc = "Go to Downloads"

[[mgr.prepend_keymap]]
on = [ "g", "c" ]
run = "cd ~/.local/share/chezmoi"
desc = "Go to chezmoi dir"

[[mgr.prepend_keymap]]
on = [ "g", "C" ]
run = "cd ~/.config"
desc = "Go to ~/.config"

[[mgr.prepend_keymap]]
on = [ "g", "?" ]
run = "help"
desc = "Open help"

[[mgr.prepend_keymap]]
on   = "~"
run  = "noop"
desc = "Disabled old help key"

[[input.prepend_keymap]]
on   = "<Esc>"
run  = "close"
desc = "Cancel input"
