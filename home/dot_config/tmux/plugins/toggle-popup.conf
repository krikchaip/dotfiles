set -g @popup-on-init "
 ; set exit-empty off
 ; set status off
 ; set -g prefix C-a
 ; bind C-a send-prefix
"

set -g @popup-id-format "#{b:socket_path}/#{session_name}/{popup_name}"

bind -N "[Pane] Toggle floating" f   run-shell "#{@popup-toggle} --toggle-key '-n C-z' --name=floating -d '#{pane_current_path}' -E"
bind -N "[Pane] Toggle floating" C-f run-shell "#{@popup-toggle} --toggle-key '-n C-z' --name=floating -d '#{pane_current_path}' -E"

# bind -N "[Popup] Open CodeCompanion at \$PWD" c   run-shell "#{@popup-toggle} --toggle-key '-n C-z' -w 60% -h 60% --name=codecompanion -d '#{pane_current_path}' -E 'NVIM_MINIMAL=true NVIM_APPNAME=nvchad nvim +CodeCompanionChat'"
# bind -N "[Popup] Open CodeCompanion at \$PWD" C-c run-shell "#{@popup-toggle} --toggle-key '-n C-z' -w 60% -h 60% --name=codecompanion -d '#{pane_current_path}' -E 'NVIM_MINIMAL=true NVIM_APPNAME=nvchad nvim +CodeCompanionChat'"

bind -N "[Popup] Open OpenCode at ~" o   run-shell "#{@popup-toggle} --toggle-key '-n C-z' --toggle-key '-n M-l' -w 70% -h 70% --id=opencode_global -E 'opencode-tmux-popup --agent ask ~'"
bind -N "[Popup] Open OpenCode at ~" C-o run-shell "#{@popup-toggle} --toggle-key '-n C-z' --toggle-key '-n M-l' -w 70% -h 70% --id=opencode_global -E 'opencode-tmux-popup --agent ask ~'"

bind -N "[Popup] Open yazi at \$PWD" y   run-shell "#{@popup-toggle} --toggle-key '-n C-z' -w 80% --name=yazi_pwd -d '#{pane_current_path}' -E 'yazi'"
bind -N "[Popup] Open yazi at \$PWD" C-y run-shell "#{@popup-toggle} --toggle-key '-n C-z' -w 80% --name=yazi_pwd -d '#{pane_current_path}' -E 'yazi'"
bind -N "[Popup] Open yazi at ~"     Y   run-shell "#{@popup-toggle} --toggle-key '-n C-z' -w 80% --name=yazi_home -E 'yazi ~'"

bind -N "[Popup] Open lazygit at \$PWD" g   run-shell "#{@popup-toggle} --toggle-key '-n C-z' -w 80% -h 80% --name=lazygit_pwd -d '#{pane_current_path}' -E 'lazygit'"
bind -N "[Popup] Open lazygit at \$PWD" C-g run-shell "#{@popup-toggle} --toggle-key '-n C-z' -w 80% -h 80% --name=lazygit_pwd -d '#{pane_current_path}' -E 'lazygit'"

# vim:ft=tmux.chezmoitmpl
