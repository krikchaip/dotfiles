set -g @popup-on-init {
  set exit-empty off
  set status off
  set -g prefix C-a
  bind C-a send-prefix
}

set -g @popup-id-format "#{b:socket_path}/#{session_name}/{popup_name}"

bind -N "[Pane] Toggle floating" f   run-shell "#{@popup-toggle} --toggle-key '-n C-z' --name=floating -d '##{pane_current_path}' -E"
bind -N "[Pane] Toggle floating" C-f run-shell "#{@popup-toggle} --toggle-key '-n C-z' --name=floating -d '##{pane_current_path}' -E"

bind -N "[Popup] Open Quick Chat" c   run-shell "#{@popup-toggle} --toggle-key '-n C-z' --toggle-key '-n C-d' -w 60% -h 60% --id=pi_popup -E 'nucmd pi-tmux-popup'"
bind -N "[Popup] Open Quick Chat" C-c run-shell "#{@popup-toggle} --toggle-key '-n C-z' --toggle-key '-n C-d' -w 60% -h 60% --id=pi_popup -E 'nucmd pi-tmux-popup'"

bind -n -N "[Popup] Open yazi at \$PWD" M-y run-shell "#{@popup-toggle} --toggle-key '-n C-z' --toggle-key '-n M-y' -w 80% --name=yazi_pwd -d '##{pane_current_path}' -E 'yazi'"

bind -n -N "[Popup] Open lazygit at \$PWD or pass to NvChad" M-g if -F '#{==:#{@pane_nvim_app},nvchad}' 'send-keys M-g' 'run-shell "#{@popup-toggle} --toggle-key '\''-n M-g'\'' -w 80% -h 80% --name=lazygit_pwd -d '\''##{pane_current_path}'\'' -E '\''lazygit-recent'\''"'

# vim:ft=tmux.chezmoitmpl
